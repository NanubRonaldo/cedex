networks:
  fabric-net:
    name: fabric-net

services:
  orderer.cedex.com:
    container_name: orderer.cedex.com
    image: hyperledger/fabric-orderer:2.5
    environment:
      - FABRIC_LOGGING_SPEC=INFO
      - ORDERER_GENERAL_LISTENADDRESS=0.0.0.0
      - ORDERER_GENERAL_LISTENPORT=7050
      - ORDERER_GENERAL_LOCALMSPID=OrdererMSP
      - ORDERER_GENERAL_LOCALMSPDIR=/var/hyperledger/orderer/msp
      - ORDERER_GENERAL_BOOTSTRAPMETHOD=file
      - ORDERER_GENERAL_BOOTSTRAPFILE=/var/hyperledger/orderer/orderer.genesis.block
      # TLS Configuration (ENABLED)
      - ORDERER_GENERAL_TLS_ENABLED=true
      - ORDERER_GENERAL_TLS_PRIVATEKEY=/var/hyperledger/orderer/tls/server.key
      - ORDERER_GENERAL_TLS_CERTIFICATE=/var/hyperledger/orderer/tls/server.crt
      - ORDERER_GENERAL_TLS_ROOTCAS=[/var/hyperledger/orderer/tls/ca.crt]
      # Admin and Operations with TLS
      - ORDERER_ADMIN_LISTENADDRESS=0.0.0.0:7053
      - ORDERER_ADMIN_TLS_ENABLED=true
      - ORDERER_ADMIN_TLS_PRIVATEKEY=/var/hyperledger/orderer/tls/server.key
      - ORDERER_ADMIN_TLS_CERTIFICATE=/var/hyperledger/orderer/tls/server.crt
      - ORDERER_ADMIN_TLS_ROOTCAS=[/var/hyperledger/orderer/tls/ca.crt]
      - ORDERER_OPERATIONS_LISTENADDRESS=0.0.0.0:8443
      - ORDERER_OPERATIONS_TLS_ENABLED=true
      - ORDERER_OPERATIONS_TLS_PRIVATEKEY=/var/hyperledger/orderer/tls/server.key
      - ORDERER_OPERATIONS_TLS_CERTIFICATE=/var/hyperledger/orderer/tls/server.crt
      - ORDERER_OPERATIONS_TLS_ROOTCAS=[/var/hyperledger/orderer/tls/ca.crt]
      # Channel participation API
      - ORDERER_CHANNELPARTICIPATION_ENABLED=true
    working_dir: /opt/gopath/src/github.com/hyperledger/fabric
    command: orderer
    ports:
      - "7050:7050"
      - "7053:7053"
      - "8443:8443"
    volumes:
      - ./channel-artifacts/genesis.block:/var/hyperledger/orderer/orderer.genesis.block
      - ./crypto-config/ordererOrganizations/cedex.com/orderers/orderer.cedex.com/msp:/var/hyperledger/orderer/msp
      - ./crypto-config/ordererOrganizations/cedex.com/orderers/orderer.cedex.com/tls:/var/hyperledger/orderer/tls
    networks:
      - fabric-net

  peer0.insurer.cedex.com:
    container_name: peer0.insurer.cedex.com
    image: hyperledger/fabric-peer:2.5
    environment:
      - FABRIC_LOGGING_SPEC=INFO
      - CORE_VM_ENDPOINT=unix:///host/var/run/docker.sock
      - CORE_VM_DOCKER_HOSTCONFIG_NETWORKMODE=fabric-net
      - CORE_PEER_ID=peer0.insurer.cedex.com
      - CORE_PEER_ADDRESS=peer0.insurer.cedex.com:7051
      - CORE_PEER_LISTENADDRESS=0.0.0.0:7051
      - CORE_PEER_CHAINCODEADDRESS=peer0.insurer.cedex.com:7052
      - CORE_PEER_CHAINCODELISTENADDRESS=0.0.0.0:7052
      - CORE_PEER_GOSSIP_BOOTSTRAP=peer0.insurer.cedex.com:7051
      - CORE_PEER_GOSSIP_EXTERNALENDPOINT=peer0.insurer.cedex.com:7051
      - CORE_PEER_LOCALMSPID=InsurerMSP
      - CORE_PEER_MSPCONFIGPATH=/etc/hyperledger/fabric/msp
      # TLS Configuration
      - CORE_PEER_TLS_ENABLED=true
      - CORE_PEER_TLS_CERT_FILE=/etc/hyperledger/fabric/tls/server.crt
      - CORE_PEER_TLS_KEY_FILE=/etc/hyperledger/fabric/tls/server.key
      - CORE_PEER_TLS_ROOTCERT_FILE=/etc/hyperledger/fabric/tls/ca.crt
      # Gossip TLS
      - CORE_PEER_GOSSIP_USELEADERELECTION=true
      - CORE_PEER_GOSSIP_ORGLEADER=false
      - CORE_PEER_GOSSIP_TLS_ENABLED=true
      # Operations
      - CORE_OPERATIONS_LISTENADDRESS=0.0.0.0:9443
      - CORE_OPERATIONS_TLS_ENABLED=true
      - CORE_OPERATIONS_TLS_CERT_FILE=/etc/hyperledger/fabric/tls/server.crt
      - CORE_OPERATIONS_TLS_KEY_FILE=/etc/hyperledger/fabric/tls/server.key
    working_dir: /opt/gopath/src/github.com/hyperledger/fabric/peer
    command: peer node start
    ports:
      - "7051:7051"
      - "7052:7052"
      - "9443:9443"
    volumes:
      - /var/run/docker.sock:/host/var/run/docker.sock
      - ./crypto-config/peerOrganizations/insurer.cedex.com/peers/peer0.insurer.cedex.com/msp:/etc/hyperledger/fabric/msp
      - ./crypto-config/peerOrganizations/insurer.cedex.com/peers/peer0.insurer.cedex.com/tls:/etc/hyperledger/fabric/tls
      - ./chaincode:/opt/gopath/src/github.com/chaincode
    networks:
      - fabric-net
    depends_on:
      - orderer.cedex.com

  peer0.lender.cedex.com:
    container_name: peer0.lender.cedex.com
    image: hyperledger/fabric-peer:2.5
    environment:
      - FABRIC_LOGGING_SPEC=INFO
      - CORE_VM_ENDPOINT=unix:///host/var/run/docker.sock
      - CORE_VM_DOCKER_HOSTCONFIG_NETWORKMODE=fabric-net
      - CORE_PEER_ID=peer0.lender.cedex.com
      - CORE_PEER_ADDRESS=peer0.lender.cedex.com:7051
      - CORE_PEER_LISTENADDRESS=0.0.0.0:7051
      - CORE_PEER_CHAINCODEADDRESS=peer0.lender.cedex.com:7052
      - CORE_PEER_CHAINCODELISTENADDRESS=0.0.0.0:7052
      - CORE_PEER_GOSSIP_BOOTSTRAP=peer0.lender.cedex.com:7051
      - CORE_PEER_GOSSIP_EXTERNALENDPOINT=peer0.lender.cedex.com:7051
      - CORE_PEER_LOCALMSPID=LenderMSP
      - CORE_PEER_MSPCONFIGPATH=/etc/hyperledger/fabric/msp
      # TLS Configuration
      - CORE_PEER_TLS_ENABLED=true
      - CORE_PEER_TLS_CERT_FILE=/etc/hyperledger/fabric/tls/server.crt
      - CORE_PEER_TLS_KEY_FILE=/etc/hyperledger/fabric/tls/server.key
      - CORE_PEER_TLS_ROOTCERT_FILE=/etc/hyperledger/fabric/tls/ca.crt
      # Gossip TLS
      - CORE_PEER_GOSSIP_USELEADERELECTION=true
      - CORE_PEER_GOSSIP_ORGLEADER=false
      - CORE_PEER_GOSSIP_TLS_ENABLED=true
      # Operations
      - CORE_OPERATIONS_LISTENADDRESS=0.0.0.0:9443
      - CORE_OPERATIONS_TLS_ENABLED=true
      - CORE_OPERATIONS_TLS_CERT_FILE=/etc/hyperledger/fabric/tls/server.crt
      - CORE_OPERATIONS_TLS_KEY_FILE=/etc/hyperledger/fabric/tls/server.key
    working_dir: /opt/gopath/src/github.com/hyperledger/fabric/peer
    command: peer node start
    ports:
      - "9051:7051"
      - "9052:7052"
      - "9444:9443"
    volumes:
      - /var/run/docker.sock:/host/var/run/docker.sock
      - ./crypto-config/peerOrganizations/lender.cedex.com/peers/peer0.lender.cedex.com/msp:/etc/hyperledger/fabric/msp
      - ./crypto-config/peerOrganizations/lender.cedex.com/peers/peer0.lender.cedex.com/tls:/etc/hyperledger/fabric/tls
      - ./chaincode:/opt/gopath/src/github.com/chaincode
    networks:
      - fabric-net
    depends_on:
      - orderer.cedex.com

  # CLI Container for admin operations
  cli:
    container_name: cli
    image: hyperledger/fabric-tools:2.5
    tty: true
    stdin_open: true
    environment:
      - FABRIC_LOGGING_SPEC=INFO
      - GOPATH=/opt/gopath
      - CORE_VM_ENDPOINT=unix:///host/var/run/docker.sock
      # Default to Insurer peer (change as needed)
      - CORE_PEER_TLS_ENABLED=true
      - CORE_PEER_ID=cli
      - CORE_PEER_ADDRESS=peer0.insurer.cedex.com:7051
      - CORE_PEER_LOCALMSPID=InsurerMSP
      - CORE_PEER_MSPCONFIGPATH=/etc/hyperledger/fabric/crypto-config/peerOrganizations/insurer.cedex.com/users/Admin@insurer.cedex.com/msp
      - CORE_PEER_TLS_ROOTCERT_FILE=/etc/hyperledger/fabric/crypto-config/peerOrganizations/insurer.cedex.com/peers/peer0.insurer.cedex.com/tls/ca.crt
    volumes:
      - ./crypto-config:/etc/hyperledger/fabric/crypto-config
      - ./channel-artifacts:/etc/hyperledger/fabric/channel-artifacts
      - ./chaincode:/opt/gopath/src/github.com/chaincode
      - /var/run/docker.sock:/host/var/run/docker.sock
    working_dir: /etc/hyperledger/fabric
    networks:
      - fabric-net
    depends_on:
      - orderer.cedex.com
      - peer0.insurer.cedex.com
      - peer0.lender.cedex.com

    # ============================================
  # BLOCK EXPLORER SERVICES
  # ============================================
  
  # PostgreSQL Database for Block Explorer
  explorer-db:
    container_name: explorer-db
    image: postgres:13
    environment:
      - POSTGRES_DB=fabricexplorer
      - POSTGRES_USER=hppoc
      - POSTGRES_PASSWORD=password
    volumes:
      - ./explorer/db:/var/lib/postgresql/data
    networks:
      - fabric-net
    restart: always
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hppoc -d fabricexplorer"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Hyperledger Fabric Block Explorer
  explorer:
    container_name: explorer
    image: hyperledger/explorer:latest
    ports:
      - "8080:8080"
    environment:
      - DATABASE_HOST=explorer-db
      - DATABASE_DATABASE=fabricexplorer
      - DATABASE_USERNAME=hppoc
      - DATABASE_PASSWORD=password
      - DISCOVERY_AS_LOCALHOST=false
      - LOG_LEVEL_APP=info
      - LOG_LEVEL_DB=info
      - LOG_LEVEL_CONSOLE=info
      - LOG_CONSOLE_STDOUT=true
    volumes:
      - ./explorer/config.json:/opt/explorer/app/platform/fabric/config.json
      - ./explorer/connection-profile/test-network.json:/opt/explorer/app/platform/fabric/connection-profile/test-network.json
      - ./crypto-config:/tmp/crypto
      - ./explorer/logs:/opt/explorer/app/logs
    networks:
      - fabric-net
    depends_on:
      explorer-db:
        condition: service_healthy
      orderer.cedex.com:
        condition: service_started
      peer0.insurer.cedex.com:
        condition: service_started
      peer0.lender.cedex.com:
        condition: service_started
    restart: always
